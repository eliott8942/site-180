{{ $script := resources.Get "js/effects/card-hover-3d.js" }}
{{ if hugo.IsProduction }}
  {{ $script = $script | minify | fingerprint }}
{{ end }}

<script defer
  crossorigin="anonymous"
  integrity="{{ $script.Data.Integrity }}"
  src="{{ $script.RelPermalink }}"
></script>

{{ $css := resources.Get "scss/effects/card-hover-3d.css" }}
{{ if hugo.IsProduction }}
  {{ $css = $script | minify | fingerprint }}
{{ end }}

<link rel="stylesheet" href="{{ $css.RelPermalink }}"></link>
